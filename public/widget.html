<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HVAC AI Chat Widget</title>
  <link rel="stylesheet" href="/widget.css" />
  <style>
    /* ── Widget Layout ──────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem;
    }

    .demo-page {
      max-width: 640px;
      width: 100%;
    }

    .demo-header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .demo-header h1 {
      font-size: 1.5rem;
      color: #1a1a2e;
      margin-bottom: 0.5rem;
    }

    .demo-header p {
      color: #666;
      font-size: 0.9rem;
    }

    .demo-info {
      background: #e8f0fe;
      border-left: 4px solid #1a73e8;
      padding: 0.75rem 1rem;
      border-radius: 0 4px 4px 0;
      margin-bottom: 1.5rem;
      font-size: 0.85rem;
      color: #1a1a2e;
    }

    .demo-info code {
      background: #cde0ff;
      padding: 1px 4px;
      border-radius: 3px;
    }
  </style>
</head>
<body>

<!-- ── Demo Page ─────────────────────────────────────────────────────── -->
<div class="demo-page">
  <div class="demo-header">
    <h1>HVAC AI Front Office</h1>
    <p>Try the embeddable chat widget — click the bubble in the bottom-right corner</p>
  </div>
  <div class="demo-info">
    Set <code>BASE_URL</code> and <code>TWILIO_FROM_NUMBER</code> before deploying.
    In demo mode (<code>WIDGET_MODE=demo</code>) responses are rule-based (no LLM needed).
  </div>
</div>

<!-- ── Embeddable Widget ─────────────────────────────────────────────── -->
<div id="hvac-ai-widget"></div>
<script>
  // ── Widget Configuration ───────────────────────────────────────────
  // Override defaults by setting window.HVAC_AI_CONFIG before loading this script
  window.HVAC_AI_CONFIG = window.HVAC_AI_CONFIG || {};
  const CONFIG = {
    baseUrl:   window.HVAC_AI_CONFIG.baseUrl   || (location.protocol + '//' + location.host),
    sessionId: window.HVAC_AI_CONFIG.sessionId || crypto.randomUUID(),
    ...window.HVAC_AI_CONFIG,
  };
</script>
<script src="/widget.js" defer></script>

</body>
</html>
