<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HVAC AI — Front Office</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0a0f;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      text-align: center;
      max-width: 600px;
      padding: 2rem;
    }
    h1 {
      font-size: 2.5rem;
      font-weight: 700;
      color: #00d4ff;
      margin-bottom: 0.5rem;
    }
    .tagline {
      font-size: 1.1rem;
      color: #888;
      margin-bottom: 3rem;
    }
    .status-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      text-align: left;
    }
    .card {
      background: #12121a;
      border: 1px solid #1e1e2e;
      border-radius: 8px;
      padding: 1.25rem;
    }
    .card .label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #666;
      margin-bottom: 0.5rem;
    }
    .card .value {
      font-size: 1.1rem;
      font-weight: 600;
    }
    .value.ok { color: #00e676; }
    .value.live { color: #00d4ff; }
    .cta {
      margin-top: 3rem;
    }
    .cta a {
      display: inline-block;
      background: #00d4ff;
      color: #0a0a0f;
      text-decoration: none;
      font-weight: 700;
      padding: 0.875rem 2rem;
      border-radius: 6px;
      transition: opacity 0.2s;
    }
    .cta a:hover { opacity: 0.85; }
    .api {
      margin-top: 2rem;
      font-size: 0.85rem;
      color: #444;
    }
    .api code {
      background: #12121a;
      padding: 0.2em 0.5em;
      border-radius: 4px;
      font-size: 0.8rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>HVAC AI</h1>
    <p class="tagline">AI-powered contractor front office</p>

    <div class="status-grid">
      <div class="card">
        <div class="label">API Status</div>
        <div class="value ok">Operational</div>
      </div>
      <div class="card">
        <div class="label">Widget</div>
        <div class="value live">Live</div>
      </div>
      <div class="card">
        <div class="label">Safety Gate</div>
        <div class="value ok">Active</div>
      </div>
      <div class="card">
        <div class="label">Dispatcher</div>
        <div class="value ok">Configured</div>
      </div>
    </div>

    <div class="cta">
      <a href="/widget.html">Open Chat Widget</a>
    </div>

    <div class="api">
      API: <code>POST /web/chat</code> &nbsp;|&nbsp; <code>GET /health</code>
    </div>
  </div>
</body>
</html>
